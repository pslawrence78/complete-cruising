<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#082b43" />
    <title>Complete Cruising offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Aptos, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: #fff8ec;
        background:
          radial-gradient(circle at 72% 0%, rgba(216, 181, 109, 0.28), transparent 24rem),
          radial-gradient(circle at 12% 20%, rgba(142, 228, 225, 0.14), transparent 28rem),
          linear-gradient(150deg, #03111d, #061827 42%, #08334b);
      }
      main {
        width: min(34rem, calc(100% - 2rem));
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 1.5rem;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.055));
        box-shadow: 0 1.25rem 3.5rem rgba(2, 16, 28, 0.3);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 0.98;
      }
      p {
        margin: 0;
        color: rgba(255, 248, 236, 0.74);
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline shell unavailable</h1>
      <p>
        Complete Cruising could not reach its cached app shell. Reopen the app
        once online so the latest sailing guide can be prepared for offline use.
      </p>
    </main>
  </body>
</html>
